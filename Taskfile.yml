version: '3'

tasks:
  release:bump-tag-push:
    desc: Bump the package version, commit it, then create and push the release tag.
    silent: true
    cmds:
      - |
        set -euo pipefail

        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Refusing to bump release version with uncommitted changes."
          git status --short
          exit 1
        fi

        next_version="$(node --input-type=module <<'NODE'
        import fs from 'node:fs'

        const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
        const current = packageJson.version
        const prereleaseMatch = current.match(/^(\d+)\.(\d+)\.(\d+)-([0-9A-Za-z-]+)\.(\d+)$/)
        const stableMatch = current.match(/^(\d+)\.(\d+)\.(\d+)$/)

        if (process.env.RELEASE_VERSION) {
          process.stdout.write(process.env.RELEASE_VERSION)
        } else if (prereleaseMatch) {
          const [, major, minor, patch, label, number] = prereleaseMatch
          process.stdout.write(`${major}.${minor}.${patch}-${label}.${Number(number) + 1}`)
        } else if (stableMatch) {
          const [, major, minor, patch] = stableMatch
          process.stdout.write(`${major}.${minor}.${Number(patch) + 1}`)
        } else {
          throw new Error(`Unsupported package version: ${current}`)
        }
        NODE
        )"

        RELEASE_NEXT_VERSION="$next_version" node --input-type=module <<'NODE'
        import fs from 'node:fs'

        const path = 'package.json'
        const packageJson = JSON.parse(fs.readFileSync(path, 'utf8'))
        packageJson.version = process.env.RELEASE_NEXT_VERSION
        fs.writeFileSync(path, `${JSON.stringify(packageJson, null, 2)}\n`)
        NODE

        git add package.json
        git commit -m "Release v$next_version"
        task release:tag-push

  release:tag-push:
    desc: Create the package version tag, then push the current branch and tag.
    silent: true
    cmds:
      - |
        set -euo pipefail

        remote="${REMOTE:-origin}"
        branch="$(git branch --show-current)"
        if [ -z "$branch" ]; then
          echo "Refusing to release from a detached HEAD."
          exit 1
        fi

        if ! git diff --quiet || ! git diff --cached --quiet; then
          echo "Refusing to tag with uncommitted changes."
          git status --short
          exit 1
        fi

        version="$(node --input-type=module -e "import fs from 'node:fs'; process.stdout.write(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
        tag="v$version"
        head_commit="$(git rev-parse HEAD)"

        echo "Preparing release $tag from $branch at $head_commit"
        git fetch "$remote" --tags

        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          tag_commit="$(git rev-list -n 1 "$tag")"
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Refusing to move existing tag $tag."
            echo "$tag points to $tag_commit, but HEAD is $head_commit."
            exit 1
          fi
          echo "Using existing local tag $tag at HEAD."
        else
          if git ls-remote --exit-code --tags "$remote" "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Remote tag $tag already exists on $remote. Fetch tags and inspect before releasing."
            exit 1
          fi
          git tag -s "$tag" -m "Release $tag"
        fi

        git push "$remote" "$branch"
        git push "$remote" "refs/tags/$tag"
        echo "Released $tag."
