name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const expectedTag = `v${packageJson.version}`
          const actualTag = process.env.GITHUB_REF_NAME

          if (actualTag !== expectedTag) {
            throw new Error(`Release tag ${actualTag} does not match package version ${expectedTag}`)
          }
          NODE

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Resolve npm dist-tag
        id: npm-dist-tag
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs'

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const match = packageJson.version.match(/-(alpha|beta|rc)\./)
          const tag = match?.[1] ?? ''

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`)
          console.log(tag ? `Publishing with npm dist-tag: ${tag}` : 'Publishing with npm default latest dist-tag')
          NODE

      - name: Publish
        env:
          NPM_DIST_TAG: ${{ steps.npm-dist-tag.outputs.tag }}
        run: |
          publish_args=(publish --access public --provenance)

          if [ -n "$NPM_DIST_TAG" ]; then
            publish_args+=(--tag "$NPM_DIST_TAG")
          fi

          npm "${publish_args[@]}"
